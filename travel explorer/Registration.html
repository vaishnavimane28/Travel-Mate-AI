<!DOCTYPE html>
<html>
<head>
    <title>Travel Registration Form</title>
</head>

<body bgcolor="pink" align="center">

    <h1 align="center">Travel Registration Form</h1>
    <hr>

    <form align="center">

        <label>Full Name:</label><br>
        <input type="text" name="name"><br><br>

        <label>Email:</label><br>
        <input type="email" name="email"><br><br>

        <label>Phone Number:</label><br>
        <input type="tel" name="phone"><br><br>

        <label>Gender:</label><br>
        <input type="radio" name="gender"> Male
        <input type="radio" name="gender"> Female<br><br>

        <label>Destination:</label><br>
        <select name="destination">
            <option>Goa</option>
            <option>Manali</option>
            <option>Kerala</option>
            <option>Jaipur</option>
            <option>Ladakh</option>
            <option>Agra</option>
        </select><br><br>

        <label>Travel Date:</label><br>
        <input type="date" name="date"><br><br>

        <label>Number of Travelers:</label><br>
        <input type="number" name="persons"><br><br>

        <label>Travel Type:</label><br>
        <input type="checkbox" name="type"> Solo
        <input type="checkbox" name="type"> Couple
        <input type="checkbox" name="type"> Family
        <input type="checkbox" name="type"> Group<br><br>

        <label>Upload ID Proof:</label><br>
        <input type="file" name="file"><br><br>

        <input type="submit" value="Book Now">
        <input type="reset" value="Clear">

    </form>

    <hr>

    <p align="center">© 2026 Travel Explorer</p>

</body>
</html>
